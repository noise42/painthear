<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Synesthesia Composer</title>
  <meta name="description" content="Transform paintings into classical sheet music with invertible pixel-to-note mapping">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/abcjs@6.4.1/dist/abcjs-basic-min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div>
      <h1>Synesthesia Composer</h1>
      <p class="subtitle">Painting → Classical Sheet Music</p>
    </div>
  </header>

  <main>
    <!-- Upload Section -->
    <section id="upload-section" class="glass-panel">
      <div id="drop-zone" class="upload-card">
        <div class="drop-icon-row">
          <span class="drop-icon">🎨</span>
          <span class="drop-icon">🎹</span>
        </div>
        <p>Drop a <strong>Painting</strong> or <strong>MIDI File</strong> here</p>
        <p class="secondary-text">or choose a file from your computer</p>
        
        <div class="upload-actions">
          <button class="primary-btn" onclick="document.getElementById('file-input').click()">🖼 Browse Image</button>
          <button class="secondary-btn" onclick="document.getElementById('midi-input').click()">🎶 Browse MIDI</button>
        </div>
        
        <input type="file" id="file-input" accept="image/*" class="hidden">
        <input type="file" id="midi-input" accept=".mid,.midi" class="hidden">
      </div>
    </section>

    <!-- Canvas Section -->
    <section id="canvas-section" class="glass-panel hidden">
      <div class="canvas-row">
        <div class="canvas-card">
          <h3>Original</h3>
          <canvas id="preview-canvas"></canvas>
        </div>
        <div class="canvas-card">
          <h3>Chroma Grid (32×32)</h3>
          <canvas id="grid-canvas" width="512" height="512"></canvas>
        </div>
      </div>
      <div class="stats-bar">
        <span id="stat-time"></span>
        <span id="stat-tempo"></span>
        <span id="stat-key"></span>
        <span id="stat-ensemble"></span>
      </div>
      <div class="title-row">
        <label for="score-title">Score Title:</label>
        <input type="text" id="score-title" placeholder="Synesthesia Composition" value="">
      </div>
      <div class="btn-row">
        <button id="compose-btn" class="primary-btn">🎼 Compose</button>
      </div>
    </section>

    <!-- Sheet Music Section -->
    <section id="score-section" class="glass-panel hidden">
      <h2>Score</h2>
      <div id="paper"></div>
      <div class="btn-row">
        <button id="play-btn" class="primary-btn">▶ Play</button>
        <button id="stop-btn" class="secondary-btn">■ Stop</button>
        <button id="download-btn" class="secondary-btn">⬇ Download MIDI</button>
        <button id="invert-btn" class="secondary-btn">🔄 Preview Musical Shadow</button>
      </div>
    </section>

    <!-- Inverted Image Section -->
    <section id="invert-section" class="glass-panel hidden">
      <h2>Reconstructed Image</h2>
      <canvas id="invert-canvas" width="512" height="512"></canvas>
    </section>
    <!-- MIDI-Generated Image Section -->
    <section id="midi-image-section" class="glass-panel hidden">
      <h2>Generated Painting</h2>
      <div class="canvas-row">
        <div class="canvas-card">
          <h3>MIDI → Painting (32×32)</h3>
          <canvas id="midi-grid-canvas" width="512" height="512"></canvas>
        </div>
      </div>
      <div class="btn-row">
        <button id="midi-play-btn" class="primary-btn">▶ Play with Cursor</button>
        <button id="midi-stop-btn" class="secondary-btn">■ Stop</button>
      </div>
    </section>
  </main>

  <footer class="credits">
    <p>Created with ❤️ by <strong>Marco Pietrosanto</strong> & <strong>Antigravity (AI)</strong> • 2026</p>
  </footer>

  <script type="module" src="main.js?v=2"></script>
</body>
</html>
